<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeclock Mock</title>
  <style>
    body { font-family: Arial, sans-serif; display:flex; min-height:100vh; margin:0; align-items:center; justify-content:center; background:#f3f6fb; }
    .card { width:min(92vw,420px); background:#fff; border-radius:16px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.08); text-align:center; }
    button { width:100%; height:64px; font-size:24px; font-weight:700; border:none; border-radius:12px; background:#1888e6; color:#fff; }
    .msg { margin-top:16px; font-size:22px; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Timeclock Mock Test</h2>
    <button id="btn">OPEN & CLOSE</button>
    <div class="msg" id="msg">READY</div>
  </div>
  <script>
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    btn.onclick = async () => {
      btn.disabled = true;
      for (let i=3; i>=1; i--) { msg.textContent = `WAIT ${i}`; await new Promise(r=>setTimeout(r,1000)); }
      msg.textContent = 'SUCCESS';
      setTimeout(()=>{ msg.textContent='READY'; btn.disabled=false; }, 1200);
    };
  </script>
</body>
</html>
